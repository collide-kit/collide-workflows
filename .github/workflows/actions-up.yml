name: Actions Up

on:
    schedule:
        # Run weekly on Monday at 00:00 UTC
        - cron: '0 0 * * 1'
    workflow_dispatch: # Allow manual triggering

permissions:
    contents: write
    pull-requests: write

jobs:
    actions-up:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

            - name: Setup Node.js
              uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
              with:
                  node-version: '20'

            - name: Install actions-up
              run: npm install -g actions-up

            - name: Update GitHub Actions in .github/workflows
              run: npx actions-up --yes

            - name: Update GitHub Actions in actions/
              run: |
                  cd actions
                  for dir in */; do
                      if [ -f "${dir}action.yml" ]; then
                          echo "Checking ${dir}action.yml"
                          cd "$dir"
                          npx actions-up --yes || true
                          cd ..
                      fi
                  done
                  cd ..

            - name: Create Pull Request
              uses: peter-evans/create-pull-request@v7
              with:
                  token: ${{ secrets.PAT_TOKEN }}
                  commit-message: '`🧩 chore(deps): update github actions to latest versions`'
                  branch: deps/update-actions
                  delete-branch: true
                  title: '`🧩 chore(deps): update github actions versions`'
                  body: |
                      This PR updates GitHub Actions to their latest versions with SHA pinning for security.

                      **Changes:**
                      - Updates action versions to specific commit SHAs
                      - Ensures reproducible builds
                      - Improves security by preventing tag manipulation

                      Generated automatically by [actions-up](https://github.com/azat-io/actions-up)
