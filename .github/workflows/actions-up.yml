name: Actions Up

on:
    schedule:
        # Run weekly on Monday at 00:00 UTC
        - cron: '0 0 * * 1'
    workflow_dispatch: # Allow manual triggering

permissions:
    contents: write
    pull-requests: write

jobs:
    actions-up:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v6.4.2

            - name: Update GitHub Actions
              uses: azat-io/actions-up@e00e8ab38af9dda6d8de93c85e60c28c8f21b693 # v1.1.3
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  commit-message: 'chore(deps): update GitHub Actions to latest versions'
                  branch: deps/update-actions
                  title: 'chore(deps): update GitHub Actions versions'
                  body: |
                      This PR updates GitHub Actions to their latest versions with SHA pinning for security.

                      **Changes:**
                      - Updates action versions to specific commit SHAs
                      - Ensures reproducible builds
                      - Improves security by preventing tag manipulation

                      Generated automatically by [actions-up](https://github.com/azat-io/actions-up)
