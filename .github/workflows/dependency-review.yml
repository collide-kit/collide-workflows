name: Dependency Review

on:
    pull_request:
        branches: [main]

permissions:
    contents: read
    pull-requests: write

jobs:
    dependency-review:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v6.4.2

            - name: Dependency Review
              uses: actions/dependency-review-action@v4
              with:
                  # Fail the build on critical or high severity vulnerabilities
                  fail-on-severity: moderate
                  # Comment on PR with vulnerability information
                  comment-summary-in-pr: always
