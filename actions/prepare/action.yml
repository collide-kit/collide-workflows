name: Setup CI
description: 'Sets up the CI environment with Node.js and Yarn'

inputs:
    node-version:
        description: 'Node.js version to install'
        required: false
        default: 'latest'

    yarn-version:
        description: 'Yarn version to install'
        required: false
        default: 'latest'

    enable-cache:
        description: 'Enable dependency caching'
        required: false
        default: 'true'

    install-dependencies:
        description: 'Install dependencies with yarn install --immutable'
        required: false
        default: 'true'

runs:
    using: composite
    steps:
        - name: Setup Node.js
          uses: actions/setup-node@v6
          with:
              node-version: ${{ inputs.node-version }}

        - name: Enable Corepack
          shell: bash
          run: corepack enable

        - name: Setup Yarn
          shell: bash
          run: corepack prepare yarn@${{ inputs.yarn-version }} --activate

        - name: Get Yarn cache directory path
          if: inputs.enable-cache == 'true'
          id: yarn-cache-dir-path
          shell: bash
          run: echo "dir=$(yarn config get cacheFolder)" >> $GITHUB_OUTPUT

        - name: Cache Yarn dependencies
          if: inputs.enable-cache == 'true'
          uses: actions/cache@v5
          with:
              path: |
                  ${{ steps.yarn-cache-dir-path.outputs.dir }}
                  node_modules
              key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
              restore-keys: |
                  ${{ runner.os }}-yarn-

        - name: Install dependencies
          if: inputs.install-dependencies == 'true'
          shell: bash
          run: yarn install --immutable
